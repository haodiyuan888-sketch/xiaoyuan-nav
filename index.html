<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no, viewport-fit=cover">
<script>
// 防止移动端初始横向溢出
document.documentElement.style.overflowX = 'hidden';
document.documentElement.style.width = '100%';
</script>
<title>小源导航 - 从这里开始上网！</title>
<style>
/* ========== CSS 变量与重置 ========== */
:root {
  --bg-overlay: rgba(255,255,255,0.72);
  --card-bg: rgba(255,255,255,0.78);
  --card-hover: rgba(255,255,255,0.92);
  --text: #1e293b;
  --text-secondary: #64748b;
  --text-muted: #94a3b8;
  --accent: #6366f1;
  --accent-light: rgba(99,102,241,0.1);
  --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
  --border: rgba(148,163,184,0.18);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  --max-width: 1400px;
  --blur: blur(12px);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  overflow-x: hidden;
  width: 100%;
}

body {
  min-height: 100vh;
  font-family: var(--font);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
  width: 100%;
  position: relative;
  background: url('1.png') center / cover no-repeat fixed;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-y;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.45);
  pointer-events: none;
  z-index: 0;
}

/* ========== 顶部栏 ========== */
.top-bar {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 24px;
  max-width: var(--max-width);
  margin: 0 auto;
  font-size: 13px;
  color: var(--text-secondary);
}

.top-bar .datetime { display: flex; align-items: center; gap: 12px; }
.top-bar .datetime .date { color: var(--text); font-weight: 600; }
.top-bar .datetime .time { color: var(--accent); font-weight: 700; font-size: 15px; font-variant-numeric: tabular-nums; }
.top-bar .lunar { color: var(--text-muted); }

/* ========== 主容器 ========== */
.main {
  position: relative;
  z-index: 1;
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 clamp(12px, 3vw, 24px) 40px;
  overflow: hidden;
  width: 100%;
}

/* ========== 头部 LOGO 区域 ========== */
.hero {
  text-align: center;
  padding: clamp(20px, 4vw, 36px) 0 6px;
}

.hero .logo {
  font-size: clamp(28px, 6vw, 46px);
  font-weight: 900;
  background: var(--accent-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
  filter: drop-shadow(0 2px 4px rgba(99,102,241,0.3));
}

.hero .slogan {
  font-size: clamp(12px, 2vw, 14px);
  color: var(--text-secondary);
  letter-spacing: 1px;
  margin-top: 2px;
}


/* ========== 搜索区域 ========== */
.search-section {
  max-width: 680px;
  margin: 16px auto 28px;
  width: 100%;
}

.search-engines {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.search-engines .engine {
  padding: 6px 15px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  background: var(--card-bg);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--border);
  transition: var(--transition);
  white-space: nowrap;
  user-select: none;
}

.search-engines .engine:hover {
  color: var(--accent);
  border-color: var(--accent);
  background: var(--accent-light);
}

.search-engines .engine.active {
  color: #fff;
  background: var(--accent);
  border-color: var(--accent);
  font-weight: 600;
}

.search-box-wrap {
  display: flex;
  align-items: center;
  background: var(--card-bg);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 2px solid var(--border);
  border-radius: 28px;
  padding: 4px 6px 4px 20px;
  box-shadow: var(--shadow-lg);
  transition: var(--transition);
}

.search-box-wrap:focus-within {
  border-color: var(--accent);
  box-shadow: 0 4px 24px rgba(99,102,241,0.2);
}

.search-box-wrap input {
  flex: 1;
  border: none;
  outline: none;
  font-size: clamp(14px, 2.5vw, 16px);
  padding: 10px 0;
  color: var(--text);
  background: transparent;
  font-family: var(--font);
  min-width: 0;
}

.search-box-wrap input::placeholder { color: var(--text-muted); }

.search-box-wrap .search-btn {
  padding: 10px clamp(16px, 3vw, 28px);
  background: var(--accent-gradient);
  color: #fff;
  border: none;
  border-radius: 24px;
  font-size: clamp(13px, 2vw, 15px);
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  letter-spacing: 1px;
  flex-shrink: 0;
}

.search-box-wrap .search-btn:hover {
  opacity: 0.9;
  transform: scale(1.02);
}

/* ========== 免责声明横幅 ========== */
.disclaimer-banner {
  margin-bottom: 20px;
  background: linear-gradient(135deg, #fff8e1 0%, #fff3cd 100%);
  border: 1.5px solid #ffc107;
  border-left: 5px solid #ff9800;
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: 0 2px 12px rgba(255,152,0,0.12);
  animation: fadeInUp 0.4s ease both;
  transition: all 0.3s ease;
}
.disclaimer-banner.dismissed {
  opacity: 0;
  max-height: 0;
  padding: 0;
  margin: 0;
  border-width: 0;
  overflow: hidden;
  pointer-events: none;
}
.disclaimer-content {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.disclaimer-icon {
  font-size: 24px;
  flex-shrink: 0;
  line-height: 1.2;
}
.disclaimer-body {
  flex: 1;
  min-width: 0;
}
.disclaimer-body strong {
  display: block;
  font-size: 14px;
  color: #e65100;
  margin-bottom: 2px;
}
.disclaimer-body span {
  font-size: 12px;
  color: #5d4037;
  line-height: 1.6;
}
.disclaimer-close {
  flex-shrink: 0;
  width: 26px; height: 26px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.08);
  color: #795548;
  font-size: 15px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  font-family: var(--font);
}
.disclaimer-close:hover {
  background: #ef5350;
  color: #fff;
}

/* ========== 分类导航 ========== */
.nav-section { margin-bottom: clamp(20px, 3vw, 32px); }

.nav-section .section-title {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  font-size: clamp(15px, 2.2vw, 17px);
  font-weight: 700;
  color: var(--text);
  padding-left: 2px;
}

.nav-section .section-title .icon { font-size: clamp(18px, 3vw, 22px); }

.nav-section .section-title .count {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-muted);
  margin-left: 2px;
}

/* 折叠展开 */
.section-title.collapsible-toggle {
  cursor: pointer;
  user-select: none;
  transition: var(--transition);
}
.section-title.collapsible-toggle:hover { color: var(--accent); }
.collapse-arrow {
  margin-left: auto;
  font-size: 14px;
  transition: transform 0.25s;
  color: var(--text-muted);
}
.section-title.collapsible-toggle:not(.collapsed) .collapse-arrow {
  transform: rotate(90deg);
}
.collapsible-body.collapsed { display: none; }

/* 多显少折 */
.link-grid-fold .link-card:nth-child(n+9) { display: none; }
.link-grid-fold.expanded .link-card:nth-child(n+9) { display: flex; }

.fold-toggle-wrap {
  text-align: center;
  margin-top: 6px;
}

.fold-toggle-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 14px;
  border-radius: 18px;
  border: none;
  background: transparent;
  color: #1e293b;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s ease;
  font-family: var(--font);
  letter-spacing: 0.3px;
}

.fold-toggle-btn:hover {
  color: var(--accent);
  background: var(--accent-light);
}

.fold-toggle-btn .fold-count {
  color: #1e293b;
  font-weight: 600;
}

.fold-toggle-btn .fold-arrow {
  font-size: 10px;
  opacity: 0.6;
  transition: transform 0.25s ease;
}

.fold-toggle-btn:hover .fold-arrow {
  opacity: 1;
  transform: translateY(1px);
}

.link-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
}

@media (min-width: 1200px) {
  .link-grid { grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); }
}

.link-card {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 12px clamp(10px, 2vw, 14px);
  background: var(--card-bg);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-radius: var(--radius-sm);
  text-decoration: none;
  color: var(--text);
  box-shadow: var(--shadow-sm);
  transition: var(--transition);
  border: 1px solid var(--border);
}

.link-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
  border-color: var(--accent);
  background: var(--card-hover);
}

.link-card .link-icon {
  width: 32px; height: 32px;
  border-radius: 10px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* 首字图标 — favicon加载前的精美兜底 */
.link-card .link-icon-initial {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%; height: 100%;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  user-select: none;
  letter-spacing: 0;
}

/* favicon图片 — 加载成功后覆盖首字 */
.link-card .link-icon-img {
  display: none;
  width: 100%; height: 100%;
  object-fit: contain;
  border-radius: 10px;
  background: #fff;
  position: absolute;
  inset: 0;
  image-rendering: -webkit-optimize-contrast;
  image-rendering: crisp-edges;
}

.link-card .link-status {
  display: none;
  font-size: 11px;
  flex-shrink: 0;
  margin-left: auto;
  opacity: 0.5;
}

.link-card.site-down { opacity: 0.4; filter: grayscale(0.6); }
.link-card.site-down:hover { opacity: 0.7; filter: none; }
.link-card.site-down .link-status { display: inline; }

.link-card .link-name {
  font-size: clamp(12px, 1.8vw, 13px);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  word-break: keep-all;
}

/* ========== 两栏布局 ========== */
.cols {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 330px;
  gap: 20px;
  margin-bottom: 32px;
  min-width: 0;
}

@media (max-width: 1100px) {
  .cols { grid-template-columns: minmax(0, 1fr); }
  .sidebar { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 16px; }
}

@media (max-width: 560px) {
  .sidebar { grid-template-columns: minmax(0, 1fr); }
}

/* ========== 热点新闻区 ========== */
.hot-section { margin-bottom: 28px; }

.hot-tabs {
  display: flex;
  margin-bottom: 12px;
  background: var(--card-bg);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-radius: var(--radius);
  padding: 4px;
  box-shadow: var(--shadow-sm);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.hot-tabs::-webkit-scrollbar { display: none; }

.hot-tabs .tab {
  flex: 1 0 auto;
  text-align: center;
  padding: 9px 6px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: clamp(11px, 1.8vw, 13px);
  font-weight: 600;
  color: var(--text-secondary);
  transition: var(--transition);
  user-select: none;
  white-space: nowrap;
  min-width: fit-content;
}

.hot-tabs .tab:hover { color: var(--accent); }

.hot-tabs .tab.active {
  background: var(--accent);
  color: #fff;
  box-shadow: var(--shadow);
}

.hot-content { display: none; }
.hot-content.active { display: block; }

.hot-list {
  list-style: none;
  background: var(--card-bg);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-radius: var(--radius);
  padding: 4px;
  box-shadow: var(--shadow-sm);
}

.hot-list li {
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: clamp(12px, 1.8vw, 13px);
  line-height: 1.4;
  user-select: none;
}

.hot-list li + li { border-top: 1px solid var(--border); }

.hot-list li:hover { background: var(--accent-light); }

.hot-list li:active { transform: scale(0.98); }

.hot-list .hot-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.hot-list .rank {
  width: 20px; height: 20px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  color: #fff;
  background: var(--text-muted);
}

.hot-list li:nth-child(1) .rank { background: #f44336; }
.hot-list li:nth-child(2) .rank { background: #ff6d3f; }
.hot-list li:nth-child(3) .rank { background: #ff9800; }

.hot-list .hot-badge {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 4px;
  flex-shrink: 0;
  font-weight: 700;
  line-height: 1.4;
}

.hot-badge.fire { background: #fee2e2; color: #dc2626; }
.hot-badge.new { background: #dbeafe; color: #2563eb; }
.hot-badge.boom { background: #fef3c7; color: #d97706; }

.hot-list .hot-num {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
}

.hot-update {
  font-size: 11px;
  color: var(--text-muted);
  text-align: right;
  margin-top: 6px;
}

/* ========== 侧边栏 ========== */
.sidebar { display: flex; flex-direction: column; gap: 16px; }

.side-card {
  background: var(--card-bg);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-radius: var(--radius-lg);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
}

.side-card h4 {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 10px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 6px;
}

/* 今日黄历 */
.huangli-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  font-size: 12px;
}

.huangli-grid .hl-item { display: flex; gap: 4px; color: var(--text-secondary); font-size: 12px; }
.huangli-grid .hl-item .hl-label { color: var(--text-muted); flex-shrink: 0; }
.huangli-grid .hl-item .hl-val { font-weight: 500; color: var(--text); }

.hl-divider { grid-column: 1 / -1; border-top: 1px solid var(--border); margin: 2px 0; }

.hl-yi-ji { font-size: 11px; line-height: 1.6; }
.hl-yi-ji .yi { color: #16a34a; }
.hl-yi-ji .ji { color: #dc2626; }

/* ========== 底部 ========== */
.footer {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 16px 16px 24px;
  font-size: 12px;
  color: var(--text-muted);
  max-width: var(--max-width);
  margin: 0 auto;
}

.footer a { color: var(--accent); text-decoration: none; }
.footer a:hover { text-decoration: underline; }
.footer .divider { margin: 0 6px; opacity: 0.4; }

/* ========== 响应式 ========== */
@media (max-width: 768px) {
  .top-bar { flex-wrap: wrap; gap: 4px; font-size: 12px; }
  .link-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; }
  .link-card { padding: 10px 10px; }
  .search-engines .engine { font-size: 11px; padding: 5px 10px; }
  .hot-tabs { gap: 0; }
}

@media (max-width: 480px) {
  .top-bar { font-size: 11px; justify-content: center; text-align: center; }
  .top-bar .datetime { flex-wrap: wrap; justify-content: center; }
  .link-grid { grid-template-columns: repeat(3, 1fr); gap: 5px; }
  .link-card { padding: 10px 6px; flex-direction: column; text-align: center; gap: 5px; border-radius: 10px; }
  .link-card .link-icon { width: 28px; height: 28px; border-radius: 6px; }
  .link-card .link-name { font-size: 11px; }
  .search-section { margin: 12px auto 20px; }
  .search-box-wrap { padding: 3px 4px 3px 14px; border-radius: 24px; }
  .search-box-wrap input { font-size: 14px; padding: 8px 0; }
  .search-box-wrap .search-btn { padding: 8px 14px; font-size: 13px; }
  .hero .logo { font-size: 26px; }
  .section-title { font-size: 14px; }
  .hot-tabs .tab { font-size: 11px; padding: 7px 5px; }
  .hot-list li { font-size: 12px; padding: 8px 8px; }
  .cols { gap: 14px; }
}

@media (max-width: 360px) {
  .link-grid { grid-template-columns: repeat(2, 1fr); gap: 4px; }
  .link-card { padding: 8px 4px; min-width: 0; }
  .link-card .link-icon { width: 24px; height: 24px; border-radius: 6px; }
  .link-card .link-icon-emoji,
  .link-card .link-icon-initial { font-size: 13px; }
  .link-card .link-name { font-size: 10px; }
  .top-bar .datetime .time { font-size: 13px; }
  .top-bar .datetime .date { font-size: 11px; }
  .hero .logo { font-size: 24px; }
  .search-box-wrap { padding: 3px 4px 3px 10px; }
  .search-box-wrap input { font-size: 13px; }
  .search-box-wrap .search-btn { padding: 7px 12px; font-size: 12px; }
}

/* ========== 动画 ========== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.nav-section { animation: fadeInUp 0.45s ease both; }
.nav-section:nth-child(1) { animation-delay: 0.03s; }
.nav-section:nth-child(2) { animation-delay: 0.08s; }
.nav-section:nth-child(3) { animation-delay: 0.13s; }
.nav-section:nth-child(4) { animation-delay: 0.18s; }
.nav-section:nth-child(5) { animation-delay: 0.23s; }

.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(30,41,59,0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: #fff;
  padding: 12px 22px;
  border-radius: 16px;
  font-size: 13px;
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  max-width: 92vw;
  white-space: pre-line;
  text-align: center;
  line-height: 1.6;
}

.toast.show { opacity: 1; }

/* 滚动条美化 */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.6); }
</style>
